apiVersion: v1
kind: Pod
metadata:
  name: mariadb
  labels:
    app: mariadb
spec:
  containers:
  - name: mariadb
    image: harbor.kakor.ovh/public/mariadb:latest
    env:
    - name: MARIADB_ROOT_PASSWORD
      valueFrom:
        secretKeyRef:
          name: mariadb-password
          key: password
    ports:
    - containerPort: 3306
    securtyContext:
      allowPrivilegeEscalation: true