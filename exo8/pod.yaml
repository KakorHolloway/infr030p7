apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  containers:
  - name: nginx
    image: harbor.kakor.ovh/public/nginx:latest
    ports:
    - containerPort: 80
    securtyContext:
      allowPrivilegeEscalation: true
    volumeMounts:
    - name: html
      mountPath: "/usr/share/nginx/html"
  volumes:
  - name: html
    persistentVolumeClaim:
      claimName: pvc-correction